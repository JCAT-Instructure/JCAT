<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instructure: Market Dominance & The Career Pivot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: #fafaf9; color: #1c1917; scroll-behavior: smooth; overflow-x: hidden; }
    .chart-container { position: relative; width: 100%; height: 350px; margin: auto; }
    .fade-in { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(231, 229, 228, 0.6); }
    .tab-active { border-color: #e11d48; color: #e11d48; background: rgba(225, 29, 72, 0.05); }
    .gradient-text { background: linear-gradient(135deg, #1c1917 0%, #e11d48 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="antialiased">
  <nav class="fixed w-full z-50 glass-card px-8 py-5 flex justify-between items-center shadow-sm">
    <div class="text-xl font-black tracking-tighter text-stone-900">INSTRUCTURE <span class="text-rose-600">CAREER</span></div>
    <div class="hidden md:flex space-x-10 text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">
      <a href="#dominance" class="hover:text-rose-600">01. Dominance</a>
      <a href="#momentum" class="hover:text-rose-600">02. Momentum</a>
      <a href="#usecases" class="hover:text-rose-600">03. Use Cases</a>
      <a href="#ecosystem" class="hover:text-rose-600">04. Ecosystem</a>
    </div>
  </nav>

  <header class="pt-48 pb-32 px-6 text-center bg-white">
    <div class="max-w-5xl mx-auto fade-in">
      <span class="text-rose-600 font-bold uppercase tracking-widest text-xs mb-4 block">Market Insight</span>
      <h1 class="text-6xl md:text-8xl font-black text-stone-900 mb-8 leading-tight">Where Quality <span class="gradient-text italic">Stands Out.</span></h1>
      <p class="text-xl text-stone-500 mb-10 max-w-3xl mx-auto">Translating Higher Ed dominance into a gold standard for Business and Government.</p>
    </div>
  </header>

  <section id="dominance" class="py-32 px-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
    <div class="fade-in">
      <h3 class="text-4xl font-black mb-8 text-stone-900">The 42% Advantage.</h3>
      <div class="grid grid-cols-2 gap-4">
        <div class="p-6 bg-stone-100 rounded-2xl border border-stone-200">
          <span class="block text-3xl font-black text-stone-900">1st</span>
          <span class="text-[10px] uppercase font-bold text-stone-500">LMS in North America</span>
        </div>
        <div class="p-6 bg-stone-100 rounded-2xl border border-stone-200">
          <span class="block text-3xl font-black text-stone-900">40%+</span>
          <span class="text-[10px] uppercase font-bold text-stone-500">Workforce Familiarity</span>
        </div>
      </div>
    </div>
    <div class="fade-in bg-white p-10 rounded-[2.5rem] shadow-xl">
      <div class="chart-container"><canvas id="shareChart"></canvas></div>
    </div>
  </section>

  <section id="ecosystem" class="py-32 px-6 bg-stone-950 text-white">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
      <div>
        <h3 class="text-5xl font-black mb-10">Better Together.</h3>
        <div class="space-y-4">
          <button onclick="switchTab('catalog')" id="btn-catalog" class="tab-btn w-full text-left p-6 rounded-2xl border border-stone-800">Canvas Catalog</button>
          <button onclick="switchTab('career')" id="btn-career" class="tab-btn w-full text-left p-6 rounded-2xl border border-stone-800 tab-active">Canvas Career</button>
        </div>
      </div>
      <div id="display-content" class="bg-stone-900 p-12 rounded-3xl min-h-[300px]">
        </div>
    </div>
  </section>

  <script>
    // Reveal animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // Market Share Chart
    const shareCtx = document.getElementById('shareChart').getContext('2d');
    new Chart(shareCtx, {
      type: 'doughnut',
      data: {
        labels: ['Canvas', 'Others'],
        datasets: [{ data: [42, 58], backgroundColor: ['#e11d48', '#d6d3d1'], borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, cutout: '80%' }
    });

    // Tab Logic
    const content = {
      catalog: { title: "Catalog", text: "The storefront for your learning content." },
      career: { title: "Career", text: "The engine for skill-mapping and mastery." }
    };
    function switchTab(key) {
      const div = document.getElementById('display-content');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
      document.getElementById(`btn-${key}`).classList.add('tab-active');
      div.innerHTML = `<h3 class="text-4xl font-bold mb-4">${content[key].title}</h3><p class="text-stone-400 text-lg">${content[key].text}</p>`;
    }
    switchTab('career'); // Init
  </script>
</body>
</html>
